# Starts MySQL in a Docker container on your machine.
# You must run this BEFORE starting your Spring Boot app.
#
# Commands:
#   docker-compose up -d    → start MySQL in background
#   docker-compose down     → stop MySQL
#   docker-compose down -v  → stop MySQL AND delete all data

version: '3.8'
services:

  mysql:
    image: mysql:8.0                        # official MySQL 8 image from Docker Hub
    environment:
      MYSQL_ROOT_PASSWORD: admin@123        # set your root password here
      MYSQL_DATABASE: funfacts              # auto-creates this database on first start
    ports:
      - "3306:3306"                         # maps MySQL port to your machine
    volumes:
      - mysql_data:/var/lib/mysql           # data survives even if container restarts
    command: --default-authentication-plugin=mysql_native_password
    # ↑ prevents authentication errors with the MySQL JDBC driver

volumes:
  mysql_data:                               # named Docker volume for MySQL data