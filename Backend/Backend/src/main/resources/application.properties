spring.application.name=Backend

#       MySQL Connection
# useSSL=false                 - no SSL needed for local development
# serverTimezone=UTC           - prevents timezone mismatch errors
# allowPublicKeyRetrieval=true - required for MySQL 8 authentication
spring.datasource.url=jdbc:mysql://localhost:3305/funfacts?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#        Hibernate / JPA
# Spring Boot 4 + Hibernate 7 auto-detects MySQL dialect -
# you do NOT need to set hibernate.dialect manually anymore

# update - auto-creates or alters MySQL tables to match your @Entity classes
# Change to "create-drop" during very early dev to wipe tables on every restart
spring.jpa.hibernate.ddl-auto=update

# Prints every SQL query Hibernate runs - very helpful for debugging
spring.jpa.show-sql=true

# Makes the printed SQL nicely indented and readable
spring.jpa.properties.hibernate.format_sql=true

#       Server
server.port=8080

# JWT secret key - change this to a long random string in production
# Must be at least 256 bits (32 characters)
jwt.secret=funfacts-super-secret-key-change-this-in-production-2024
jwt.expiration=86400000